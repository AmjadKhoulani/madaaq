name: Deploy to Server

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          su -s /bin/bash madaaq -c "
            cd /home/madaaq/public_html &&
            echo 'Updating code from master...' &&
            git fetch origin master &&
            git reset --hard origin/master &&
            
            echo 'Ensuring directory permissions...' &&
            chmod -R 775 public/build storage bootstrap/cache &&
            
            echo 'Installing dependencies & Optimizing...' &&
            composer install --no-dev --optimize-autoloader &&
            php artisan migrate --force &&
            php artisan optimize:clear &&
            php artisan optimize &&
            
            echo 'Deployment successful for MadaaQ v2.'
          "
