name: Deploy to Server

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          su -s /bin/bash madaaq -c "
            cd /home/madaaq/public_html &&
            
            echo 'Force cleaning stale configuration...' &&
            rm -f public/hot || true &&
            php artisan config:clear || true &&
            php artisan cache:clear || true &&
            php artisan view:clear || true &&
            
            echo 'Updating code from master...' &&
            git fetch origin master &&
            git reset --hard origin/master &&
            
            echo 'Ensuring directory permissions...' &&
            chmod -R 775 public/build storage bootstrap/cache || true &&
            
            echo 'Installing dependencies...' &&
            # Force update Ziggy to fix the Lock mismatch, but allow it to fail
            composer update tightenco/ziggy --no-dev --no-interaction --optimize-autoloader || true &&
            composer install --no-dev --optimize-autoloader &&
            
            echo 'Finalizing system optimization...' &&
            php artisan migrate --force &&
            php artisan optimize &&
            
            echo 'Deployment successful for MadaaQ v2.'
          "
